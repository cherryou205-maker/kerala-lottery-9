<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kerala Lottery Admin</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:340px;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#16a34a;
color:#fff;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#15803d;
}

#panel{
display:none;
}

#msg{
margin-top:10px;
text-align:center;
font-weight:bold;
color:green;
}
</style>
</head>

<body>

<div class="box">

<div id="login">

<h2>Admin Login</h2>

<input type="password" id="pass" placeholder="Enter Password">

<button onclick="login()">Login</button>

</div>

<div id="panel">

<h2>Update WhatsApp</h2>

<input type="text" id="number" placeholder="91xxxxxxxxxx">

<button id="save">Update Number</button>

<div id="msg"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {

apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
databaseURL:"YOUR_DATABASE_URL",
projectId:"YOUR_PROJECT_ID",
storageBucket:"YOUR_STORAGE_BUCKET",
messagingSenderId:"YOUR_SENDER_ID",
appId:"YOUR_APP_ID"

};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

window.login=function(){

if(document.getElementById("pass").value=="123456"){

document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";

get(ref(db,"whatsapp")).then((snap)=>{
if(snap.exists()){
document.getElementById("number").value=snap.val().number;
}
});

}else{
alert("Wrong Password");
}

}

document.getElementById("save").onclick=function(){

let num=document.getElementById("number").value;

set(ref(db,"whatsapp"),{
number:num
});

document.getElementById("msg").innerHTML="Number Updated Successfully";

}

</script>

</body>
</html>
